<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ayaya日语是一款浏览器端日语学习卡片，提供假名、N5/N4 词汇与语法练习。"
    />
    <meta name="theme-color" content="#000000" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:title" content="ayaya日语" />
    <meta
      property="og:description"
      content="使用学习卡片练习假名、N5/N4 词汇与语法。"
    />
    <meta property="og:url" content="https://ayaya114514.github.io/ayaya_jp/" />
    <title>ayaya日语</title>
    <link rel="canonical" href="https://ayaya114514.github.io/ayaya_jp/" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%0A%20%20%3Cdefs%3E%0A%20%20%20%20%3ClinearGradient%20id%3D%22g%22%20x1%3D%2212%22%20y1%3D%228%22%20x2%3D%2252%22%20y2%3D%2258%22%20gradientUnits%3D%22userSpaceOnUse%22%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%220%22%20stop-color%3D%22%232f9c83%22%2F%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%221%22%20stop-color%3D%22%2317645d%22%2F%3E%0A%20%20%20%20%3C%2FlinearGradient%3E%0A%20%20%3C%2Fdefs%3E%0A%20%20%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2218%22%20fill%3D%22url(%23g)%22%2F%3E%0A%20%20%3Crect%20x%3D%228%22%20y%3D%228%22%20width%3D%2248%22%20height%3D%2248%22%20rx%3D%2214%22%20fill%3D%22none%22%20stroke%3D%22rgba(255%2C255%2C255%2C.24)%22%20stroke-width%3D%222%22%2F%3E%0A%20%20%3Ctext%20x%3D%2232%22%20y%3D%2243%22%20text-anchor%3D%22middle%22%20font-size%3D%2235%22%20font-weight%3D%22800%22%20fill%3D%22%23fff%22%20font-family%3D%22Hiragino%20Sans%2C%20Noto%20Sans%20JP%2C%20Arial%2C%20sans-serif%22%3E%E3%81%82%3C%2Ftext%3E%0A%3C%2Fsvg%3E" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1 class="sr-only" id="appTitle">ayaya日语学习卡片</h1>
      <noscript>
        <div class="noscript-banner" role="alert">
          此应用需要 JavaScript 才能运行。请启用 JavaScript 后刷新页面。
        </div>
      </noscript>
      <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true" hidden></div>
      <aside
        class="deck-sidebar"
        id="deckSidebar"
        aria-hidden="true"
        aria-labelledby="deckSidebarTitle"
        inert
      >
        <div class="sidebar-header">
          <h2 id="deckSidebarTitle">学习模块</h2>
          <button class="icon-button" id="closeDeckMenu" type="button" title="关闭模块菜单" aria-label="关闭模块菜单">
            ×
          </button>
        </div>
        <nav class="deck-tabs" aria-label="学习模块">
          <section class="deck-group" data-group="base" aria-labelledby="base-group-title">
            <button class="deck-group-toggle" type="button" aria-expanded="true" aria-controls="base-decks">
              <span class="deck-group-title" id="base-group-title">基础</span>
            </button>
            <div class="deck-group-items" id="base-decks">
              <button class="tab-button active" type="button" data-deck="hiragana" aria-pressed="true">
                <span class="deck-label">平假名</span>
                <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
              </button>
              <button class="tab-button" type="button" data-deck="katakana" aria-pressed="false">
                <span class="deck-label">片假名</span>
                <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
              </button>
              <button class="tab-button" type="button" data-deck="romaji" aria-pressed="false">
                <span class="deck-label">罗马音</span>
                <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
              </button>
              <button class="tab-button" type="button" data-deck="special" aria-pressed="false">
                <span class="deck-label">变体音</span>
                <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
              </button>
            </div>
          </section>
          <section class="deck-group" data-group="vocab" aria-labelledby="vocab-group-title">
            <button class="deck-group-toggle" type="button" aria-expanded="true" aria-controls="vocab-decks">
              <span class="deck-group-title" id="vocab-group-title">词汇</span>
            </button>
            <div class="deck-group-items" id="vocab-decks">
              <div class="deck-level" data-level="n5">
                <button
                  class="deck-level-toggle"
                  type="button"
                  aria-expanded="true"
                  aria-controls="vocab-n5-decks"
                >
                  <span class="deck-level-title">N5</span>
                </button>
                <div class="deck-level-items" id="vocab-n5-decks">
                  <button class="tab-button vocab-tab" type="button" data-deck="vocab-ja-zh" aria-pressed="false">
                    <span class="deck-label">日→中</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button vocab-tab" type="button" data-deck="vocab-zh-ja" aria-pressed="false">
                    <span class="deck-label">中→日</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button vocab-tab" type="button" data-deck="vocab-mistakes" aria-pressed="false">
                    <span class="deck-label">错题集</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                </div>
              </div>
              <div class="deck-level" data-level="n4">
                <button
                  class="deck-level-toggle"
                  type="button"
                  aria-expanded="true"
                  aria-controls="vocab-n4-decks"
                >
                  <span class="deck-level-title">N4</span>
                </button>
                <div class="deck-level-items" id="vocab-n4-decks">
                  <button class="tab-button vocab-tab" type="button" data-deck="vocab-n4-ja-zh" aria-pressed="false">
                    <span class="deck-label">日→中</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button vocab-tab" type="button" data-deck="vocab-n4-zh-ja" aria-pressed="false">
                    <span class="deck-label">中→日</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button vocab-tab" type="button" data-deck="vocab-n4-mistakes" aria-pressed="false">
                    <span class="deck-label">错题集</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                </div>
              </div>
            </div>
          </section>
          <section class="deck-group" data-group="grammar" aria-labelledby="grammar-group-title">
            <button class="deck-group-toggle" type="button" aria-expanded="true" aria-controls="grammar-decks">
              <span class="deck-group-title" id="grammar-group-title">语法</span>
            </button>
            <div class="deck-group-items" id="grammar-decks">
              <div class="deck-level" data-level="grammar-n5">
                <button
                  class="deck-level-toggle"
                  type="button"
                  aria-expanded="true"
                  aria-controls="grammar-n5-decks"
                >
                  <span class="deck-level-title">N5</span>
                </button>
                <div class="deck-level-items" id="grammar-n5-decks">
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n5-zh-ja" aria-pressed="false">
                    <span class="deck-label">中→日</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n5-ja-zh" aria-pressed="false">
                    <span class="deck-label">日→中</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n5-pattern-zh" aria-pressed="false">
                    <span class="deck-label">文型</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n5-choice" aria-pressed="false">
                    <span class="deck-label">选择题</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n5-mistakes" aria-pressed="false">
                    <span class="deck-label">错题集</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                </div>
              </div>
              <div class="deck-level" data-level="grammar-n4">
                <button
                  class="deck-level-toggle"
                  type="button"
                  aria-expanded="true"
                  aria-controls="grammar-n4-decks"
                >
                  <span class="deck-level-title">N4</span>
                </button>
                <div class="deck-level-items" id="grammar-n4-decks">
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n4-zh-ja" aria-pressed="false">
                    <span class="deck-label">中→日</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n4-ja-zh" aria-pressed="false">
                    <span class="deck-label">日→中</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n4-pattern-zh" aria-pressed="false">
                    <span class="deck-label">文型</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n4-choice" aria-pressed="false">
                    <span class="deck-label">选择题</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                  <button class="tab-button grammar-tab" type="button" data-deck="grammar-n4-mistakes" aria-pressed="false">
                    <span class="deck-label">错题集</span>
                    <span class="deck-round-count" aria-label="已完成 0 轮">0轮</span>
                  </button>
                </div>
              </div>
            </div>
          </section>
        </nav>
      </aside>

      <section class="study-area" aria-labelledby="appTitle" aria-busy="true">
        <div class="study-card" id="studyCard">
          <div class="study-header">
            <section class="stats-grid" aria-label="学习进度">
              <button
                class="icon-button stat-action module-button"
                id="deckMenuButton"
                type="button"
                title="切换模块"
                aria-label="切换模块"
                aria-controls="deckSidebar"
                aria-expanded="false"
              >
                ☰
              </button>
              <div class="stat">
                <span class="stat-value" id="dueCount">0</span>
                <span class="stat-label">待练</span>
              </div>
              <div class="stat">
                <span class="stat-value" id="reviewedCount">0</span>
                <span class="stat-label">已练</span>
              </div>
              <button class="icon-button stat-action undo-button" id="undoRating" type="button" title="撤回上次评分" aria-label="撤回上次评分" disabled>
                ↶
              </button>
            </section>

            <div class="app-status" id="appStatus" role="status" aria-live="polite" aria-atomic="true">
              正在准备学习卡片……如果长时间没有完成，请刷新页面。
            </div>
            <div
              class="load-error-banner"
              id="loadErrorBanner"
              role="alert"
              aria-live="assertive"
              aria-atomic="true"
              tabindex="-1"
              hidden
            ></div>
            <div
              class="fatal-error-banner"
              id="fatalErrorBanner"
              role="alert"
              aria-live="assertive"
              aria-atomic="true"
              tabindex="-1"
              hidden
            >
              应用未能启动。请刷新页面；如果问题持续，请确认所有本地资源都能正常加载。
            </div>
          </div>

          <div class="card" id="flashcard">
            <button
              class="card-reveal"
              id="cardReveal"
              type="button"
              aria-controls="answerPanel"
              aria-describedby="cardPrompt cardSubtle cardRevealHint"
              aria-expanded="false"
            >
              <span class="card-prompt" id="cardPrompt"></span>
              <span class="card-subtle" id="cardSubtle"></span>
              <span class="sr-only" id="cardRevealHint">按下以显示答案</span>
            </button>
            <button class="icon-button prompt-speak" id="speakWord" type="button" title="播放读音" aria-label="播放读音">
              ▶
            </button>
          </div>

          <div class="answer-panel" id="answerPanel" aria-hidden="true">
            <div class="choice-block" id="choiceBlock" hidden>
              <div class="choice-list" id="choiceList"></div>
              <div class="choice-feedback" id="choiceFeedback" hidden></div>
            </div>
            <div class="answer-main" id="answerMain"></div>
            <div class="answer-meta" id="answerMeta"></div>
            <div class="example-block" id="exampleBlock" hidden>
              <div class="examples-list" id="examplesList"></div>
            </div>
            <div class="feedback-row" hidden>
              <button class="feedback clear" type="button" data-rating="clear">清楚</button>
              <button class="feedback unsure" type="button" data-rating="unsure">不确定</button>
              <button class="feedback forgot" type="button" data-rating="forgot">遗忘</button>
            </div>
            <button class="primary-button choice-next" id="choiceNext" type="button" hidden>下一题</button>
          </div>
          <div class="memory-chain" id="memoryChain" aria-label="记忆链条"></div>
        </div>

        <div class="empty-state" id="emptyState" hidden>
          <h2>当前模块完成</h2>
          <p id="roundStatusText"></p>
          <button class="primary-button empty-menu-button" id="emptyDeckMenuButton" type="button">切换模块</button>
          <button class="primary-button restart-button" id="studyAnyWay" type="button">重新开始</button>
        </div>
      </section>
    </main>

    <script src="./n5-codex-vocab.js"></script>
    <script src="./ayaya-n4-codex-vocab.js"></script>
    <script src="./grammar-data.js"></script>
    <script src="./card-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
